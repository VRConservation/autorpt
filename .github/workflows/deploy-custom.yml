name: Deploy Docs to Custom Server

# This workflow deploys documentation to a custom server (e.g., 3point.xyz/autorpt)
# To use this workflow:
# 1. Uncomment the 'on:' section below
# 2. Add these secrets to your GitHub repository (Settings → Secrets → Actions):
#    - SSH_PRIVATE_KEY: Your SSH private key for server access
#    - REMOTE_HOST: Your server hostname (e.g., 3point.xyz or IP address)
#    - REMOTE_USER: SSH username for server access
#    - REMOTE_PATH: Path on server where docs should be deployed (e.g., /var/www/3point.xyz/autorpt)
# 3. Adjust the deployment method in the last step if needed

# Uncomment to enable:
# on:
#   push:
#     branches:
#       - main
#   workflow_dispatch:

on:
  workflow_dispatch:

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for git revision dates
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_dev.txt
          pip install .
      
      - name: Set Jupyter platform dirs
        run: |
          echo "JUPYTER_PLATFORM_DIRS=1" >> $GITHUB_ENV
      
      - name: Build documentation
        run: |
          mkdocs build --verbose
      
      - name: Display build output
        run: |
          ls -la site/
          echo "Documentation built successfully"
      
      # Method 1: Deploy via rsync over SSH
      - name: Deploy to server via rsync
        if: false  # Change to 'true' to enable this method
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete
          path: site/
          remote_path: ${{ secrets.REMOTE_PATH }}
          remote_host: ${{ secrets.REMOTE_HOST }}
          remote_user: ${{ secrets.REMOTE_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      # Method 2: Deploy via SCP
      - name: Deploy to server via SCP
        if: false  # Change to 'true' to enable this method
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "site/*"
          target: ${{ secrets.REMOTE_PATH }}
          strip_components: 1
      
      # Method 3: Custom SSH commands
      - name: Deploy via custom SSH script
        if: true  # Change to 'false' to disable this method
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create a timestamp backup of existing docs
            if [ -d "${{ secrets.REMOTE_PATH }}" ]; then
              mv "${{ secrets.REMOTE_PATH }}" "${{ secrets.REMOTE_PATH }}.backup.$(date +%Y%m%d_%H%M%S)"
            fi
            # Create target directory
            mkdir -p "${{ secrets.REMOTE_PATH }}"
            echo "Deployment directory ready"
      
      - name: Upload built site
        if: true
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "site/"
          target: ${{ secrets.REMOTE_PATH }}
          strip_components: 1
          rm: true
      
      - name: Verify deployment
        if: true
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ls -la "${{ secrets.REMOTE_PATH }}"
            echo "Deployment completed successfully"
            
      - name: Deployment summary
        run: |
          echo "✅ Documentation deployed successfully"
          echo "📚 Site should be available at your custom domain"
          echo "🔗 Check: https://3point.xyz/autorpt"
